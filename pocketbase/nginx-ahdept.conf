## nginx site config — Pashudhan Kartavya (app + PocketBase backend)
## ------------------------------------------------------------------
## Install:
##   sudo cp pocketbase/nginx-ahdept.conf /etc/nginx/sites-available/ahdept
##   sudo ln -s /etc/nginx/sites-available/ahdept /etc/nginx/sites-enabled/
##   sudo nginx -t && sudo systemctl reload nginx
## Then get HTTPS for BOTH names:
##   sudo certbot --nginx -d ah.yourdomain.com -d pb.yourdomain.com
##
## Replace ah.yourdomain.com / pb.yourdomain.com with your real DNS names.
## Both must have A records pointing at this VPS.

# 1) The app (static PWA)
server {
    listen 80;
    server_name ah.yourdomain.com;

    root /var/www/ahdept;
    index index.html;

    location / { try_files $uri $uri/ /index.html; }

    # Let the service worker + config update promptly
    location = /service-worker.js { add_header Cache-Control "no-cache"; }
    location = /config.js          { add_header Cache-Control "no-cache"; }
    location = /manifest.json      { default_type application/manifest+json; }
}

# 2) PocketBase backend (its own subdomain so the admin dashboard works cleanly)
server {
    listen 80;
    server_name pb.yourdomain.com;

    client_max_body_size 25m;

    location / {
        proxy_pass http://127.0.0.1:8090;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;          # PocketBase realtime (SSE/WS)
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 360s;
    }
}
